services:
  frontend:
    image: g0dd0r0/treffly-client:latest
    ports:
      - "80:80"
    restart: always
    networks:
      - app-network

  backend:
    image: m1ll3r1337/treffly-server:latest
    expose:
      - "8080:8080"
    restart: always
    networks:
      - app-network

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge